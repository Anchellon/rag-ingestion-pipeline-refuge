# Application Configuration
# Note: OLLAMA_BASE_URL must be set via .env file (see .env.example)

embeddings:
  provider: "ollama"       # Swap to "bedrock" or "openai" without code changes
  model: "nomic-embed-text"
  base_url: "http://localhost:11434"  # Overridden by OLLAMA_BASE_URL env var

postgres:
  table_name: "service_snapshots"
  sql_file: "sql/service_snapshot.sql"
  batch_size: 100
